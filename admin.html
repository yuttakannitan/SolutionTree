<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GreenHub Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Noto+Serif+Thai:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --teal: #00a79d;
    --teal-deep: #007d75;
    --teal-light: #66cfc8;
    --teal-pale: #b3e8e5;
    --teal-wash: #e6f7f6;
    --cream: #f5fafa;
    --cream-dark: #ddf0ef;
    --text-dark: #0d2926;
    --text-mid: #2a5450;
    --text-soft: #5a8c88;
    --shadow: 0 2px 16px rgba(0,167,157,0.10);
}

html, body { min-height: 100vh; background: var(--cream); font-family: 'Noto Sans Thai', sans-serif; color: var(--text-dark); }

.topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,0.93);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--cream-dark);
    padding: 14px 20px;
    display: flex; align-items: center; gap: 10px;
}
.topbar-brand { font-family: 'Noto Serif Thai', serif; font-size: 16px; font-weight: 600; color: var(--teal-deep); }

.main-content { padding: 24px 20px 60px; max-width: 600px; margin: 0 auto; }

.section-title { font-size: 11px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-soft); margin-bottom: 10px; margin-top: 28px; }

.config-card {
    background: #fff; border-radius: 16px; border: 1.5px solid var(--cream-dark);
    padding: 18px;
}

.field-label { font-size: 12px; font-weight: 600; color: var(--text-soft); margin-bottom: 6px; display: block; }
.field-input {
    width: 100%; padding: 12px 14px; border-radius: 12px;
    border: 1.5px solid var(--cream-dark); font-size: 14px;
    font-family: 'Noto Sans Thai', sans-serif;
    background: var(--cream); color: var(--text-dark);
    outline: none; transition: border-color 0.2s;
}
.field-input:focus { border-color: var(--teal); background: #fff; }

.config-row { display: flex; gap: 10px; align-items: flex-end; }
.config-row .field-input { flex: 1; }

.btn-load {
    padding: 12px 18px; border-radius: 12px;
    background: var(--teal); color: #fff; border: none;
    font-size: 14px; font-weight: 600; font-family: 'Noto Sans Thai', sans-serif;
    cursor: pointer; white-space: nowrap; transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
}
.btn-load:hover  { background: var(--teal-deep); }
.btn-load:active { transform: scale(0.98); }

.status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #ccc; margin-right: 6px; vertical-align: middle; }
.status-dot.ok  { background: #27ae60; }
.status-dot.err { background: #c0392b; }
.status-text { font-size: 12px; color: var(--text-soft); margin-top: 10px; min-height: 18px; }

.hint-box {
    background: var(--teal-wash); border-radius: 12px;
    padding: 12px 14px; font-size: 13px; color: var(--text-mid);
    line-height: 1.8; margin-top: 12px;
    border: 1px solid var(--teal-pale);
}
.hint-box b { color: var(--teal-deep); }
.hint-box code { background: rgba(0,167,157,0.12); border-radius: 4px; padding: 1px 5px; font-size: 12px; }

.plant-list { display: flex; flex-direction: column; gap: 8px; }

.plant-card {
    background: #fff; border-radius: 14px; border: 1.5px solid var(--cream-dark);
    padding: 14px 16px;
    transition: border-color 0.2s, box-shadow 0.2s;
    animation: fadeUp 0.3s ease both;
}
.plant-card:hover { border-color: var(--teal-light); box-shadow: var(--shadow); }

.plant-card-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.plant-card-name { font-size: 15px; font-weight: 600; color: var(--text-dark); }
.plant-card-sub  { font-size: 12px; color: var(--text-soft); margin-top: 3px; }

.btn-group { display: flex; gap: 6px; flex-shrink: 0; }

.btn-preview {
    padding: 7px 14px; border-radius: 10px;
    background: var(--teal-wash); color: var(--teal-deep);
    border: 1.5px solid var(--teal-pale);
    font-size: 13px; font-weight: 600; font-family: 'Noto Sans Thai', sans-serif;
    cursor: pointer; transition: background 0.2s;
    text-decoration: none; display: inline-block;
}
.btn-preview:hover { background: var(--teal-pale); }

.btn-copy {
    padding: 7px 14px; border-radius: 10px;
    background: var(--teal); color: #fff; border: none;
    font-size: 13px; font-weight: 600; font-family: 'Noto Sans Thai', sans-serif;
    cursor: pointer; transition: background 0.2s, transform 0.1s;
}
.btn-copy:hover  { background: var(--teal-deep); }
.btn-copy:active { transform: scale(0.97); }
.btn-copy.copied { background: #27ae60; }

.plant-url {
    font-size: 11px; color: var(--text-soft); margin-top: 10px;
    background: var(--cream); border-radius: 8px; padding: 8px 10px;
    word-break: break-all; line-height: 1.6;
    border: 1px solid var(--cream-dark);
}

.empty-state { text-align: center; padding: 48px 20px; color: var(--text-soft); font-size: 14px; line-height: 1.8; }
.empty-icon  { font-size: 40px; margin-bottom: 12px; }

@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>

<div class="topbar">
    <span>🌿</span>
    <span class="topbar-brand">Genius Admin</span>
</div>

<div class="main-content">

    <p class="section-title">ตั้งค่า Google Sheet</p>
    <div class="config-card">
        <label class="field-label">Sheet ID หรือ URL ของ Google Sheet</label>
        <div class="config-row">
            <input class="field-input" type="text" id="sheetIdInput"
                placeholder="วาง Sheet ID หรือ URL ของ Google Sheet"
                onkeydown="if(event.key==='Enter') loadSheet()">
            <button class="btn-load" onclick="loadSheet()">โหลด</button>
        </div>
        <div class="status-text" id="statusText"></div>
        <div class="hint-box">
            <b>วิธีหา Sheet ID</b><br>
            เปิด Google Sheet → ดูที่ URL แถบบน<br>
            <code>docs.google.com/spreadsheets/d/<b>[ ID อยู่ตรงนี้ ]</b>/edit</code><br><br>
            <b>⚠️ สำคัญ</b> — Sheet ต้องตั้งการแชร์เป็น <b>Anyone with the link → Viewer</b>
        </div>
    </div>

    <p class="section-title">รายการต้นไม้</p>
    <div class="plant-list" id="plantList">
        <div class="empty-state">
            <div class="empty-icon">🪴</div>
            กรอก Sheet ID แล้วกด <b>โหลด</b><br>เพื่อดูรายการต้นไม้ทั้งหมด
        </div>
    </div>

</div>

<script>
    /* ── เปลี่ยนตรงนี้เมื่อได้ URL จริงจาก Cloudflare ── */
    const SITE_URL = 'https://solutiontree.pages.dev'; // ← เปลี่ยนเป็น URL จริง
    const SHEET_NAME = 'Sheet1';

    function extractSheetId(input) {
        input = input.trim();
        const m = input.match(/\/spreadsheets\/d\/([^\/\?&]+)/);
        return m ? m[1] : input;
    }

    async function loadSheet() {
        const raw = document.getElementById('sheetIdInput').value;
        if (!raw.trim()) return;

        const id = extractSheetId(raw);
        document.getElementById('sheetIdInput').value = id;

        const statusEl = document.getElementById('statusText');
        const listEl   = document.getElementById('plantList');

        statusEl.innerHTML = '<span class="status-dot"></span>กำลังโหลด...';
        listEl.innerHTML   = '<div class="empty-state"><div class="empty-icon">⏳</div>กำลังดึงข้อมูล...</div>';

        try {
            const res  = await fetch(`https://opensheet.elk.sh/${id}/${SHEET_NAME}`);
            if (!res.ok) throw new Error();
            const data = await res.json();
            if (!Array.isArray(data) || !data.length) throw new Error();

            statusEl.innerHTML = `<span class="status-dot ok"></span>โหลดสำเร็จ — พบ <b>${data.length}</b> ต้นไม้`;
            renderPlants(data, id);
        } catch(e) {
            statusEl.innerHTML = '<span class="status-dot err"></span>โหลดไม่สำเร็จ — ตรวจสอบ Sheet ID และการตั้งค่าการแชร์';
            listEl.innerHTML   = '<div class="empty-state"><div class="empty-icon">❌</div>ไม่สามารถดึงข้อมูลได้<br><br>ตรวจสอบว่า Sheet ตั้งเป็น <b>Anyone with the link can view</b></div>';
        }
    }

    function renderPlants(data, sheetId) {
        const listEl = document.getElementById('plantList');
        listEl.innerHTML = '';

        data.forEach((plant, i) => {
            const name = (plant.name || plant.Name || '').trim();
            if (!name) return;

            const url = `${SITE_URL}/?sheet=${sheetId}&name=${encodeURIComponent(name)}`;

            const card = document.createElement('div');
            card.className = 'plant-card';
            card.style.animationDelay = `${i * 0.05}s`;

            const safeUrl = url.replace(/`/g, '%60');
            card.innerHTML = `
                <div class="plant-card-top">
                    <div>
                        <div class="plant-card-name">🌱 ${name}</div>
                        <div class="plant-card-sub">${plant.sunlight || '—'}</div>
                    </div>
                    <div class="btn-group">
                        <a class="btn-preview" href="${url}" target="_blank" rel="noopener">ดูตัวอย่าง</a>
                        <button class="btn-copy" data-url="${safeUrl}" onclick="copyLink(this)">คัดลอก</button>
                    </div>
                </div>
                <div class="plant-url">${url}</div>
            `;
            listEl.appendChild(card);
        });
    }

    function copyLink(btn) {
        const url = btn.getAttribute('data-url');
        navigator.clipboard.writeText(url).then(() => {
            btn.textContent = '✓ คัดลอกแล้ว';
            btn.classList.add('copied');
            setTimeout(() => { btn.textContent = 'คัดลอก'; btn.classList.remove('copied'); }, 2000);
        });
    }
</script>
</body>
</html>
