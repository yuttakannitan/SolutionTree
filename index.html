<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>GreenHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Noto+Serif+Thai:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --teal: #00a79d;
            --teal-deep: #007d75;
            --teal-light: #66cfc8;
            --teal-pale: #b3e8e5;
            --teal-wash: #e6f7f6;
            --cream: #f5fafa;
            --cream-dark: #ddf0ef;
            --text-dark: #0d2926;
            --text-mid: #2a5450;
            --text-soft: #5a8c88;
            --shadow-card: 0 2px 12px rgba(0,167,157,0.09);
        }

        html { background: var(--cream); }

        body {
            font-family: 'Noto Sans Thai', sans-serif;
            background: var(--cream);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .phone-frame {
            width: 100%;
            max-width: 390px;
            min-height: 100vh;
            background: #fff;
            position: relative;
            overflow: hidden;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255,255,255,0.93);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            padding: 14px 20px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar-title {
            font-family: 'Noto Serif Thai', serif;
            font-size: 15px;
            font-weight: 600;
            color: var(--teal-deep);
            flex: 1;
        }

        .hero {
            position: relative;
            height: 260px;
            overflow: hidden;
            background: linear-gradient(155deg, var(--teal-wash) 0%, #c6eeeb 50%, #a0e0db 100%);
        }

        .hero-bg-circle {
            position: absolute;
            width: 280px; height: 280px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,167,157,0.18) 0%, transparent 70%);
            top: -40px; right: -40px;
        }

        .hero-img {
            width: 100%; height: 100%;
            object-fit: cover;
            position: relative;
            z-index: 1;
            image-rendering: -webkit-optimize-contrast; /* Safari */
            image-rendering: crisp-edges;
        }

        .content { padding: 22px 20px 40px; }

        .plant-name {
            font-family: 'Noto Serif Thai', serif;
            font-size: 26px;
            font-weight: 600;
            color: var(--teal-deep);
            line-height: 1.3;
            margin-bottom: 4px;
            min-height: 36px;
        }

        .section-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: var(--text-soft);
            margin-bottom: 10px;
            margin-top: 24px;
        }

        .expand-list { display: flex; flex-direction: column; gap: 4px; }

        .expand-row {
            background: #fff;
            border: 1.5px solid var(--cream-dark);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
        }
        .expand-row:hover { border-color: var(--teal-light); box-shadow: var(--shadow-card); }
        .expand-row.open  { border-color: var(--teal); box-shadow: 0 2px 16px rgba(0,167,157,0.12); }

        .expand-header {
            display: flex; align-items: center; gap: 8px;
            padding: 14px 16px; width: 100%;
        }

        .expand-icon  { font-size: 18px; flex-shrink: 0; }
        .expand-title { font-size: 14px; font-weight: 600; color: var(--text-dark); flex: 1; }

        .expand-arrow {
            width: 22px; height: 22px; border-radius: 50%;
            background: var(--teal-wash);
            display: flex; align-items: center; justify-content: center;
            color: var(--teal); font-size: 11px; flex-shrink: 0;
            transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), background 0.25s ease;
        }
        .expand-row.open .expand-arrow { transform: rotate(180deg); background: var(--teal-pale); }

        .expand-body {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.38s cubic-bezier(0.4,0,0.2,1);
        }
        .expand-row.open .expand-body { grid-template-rows: 1fr; }
        .expand-body-inner { overflow: hidden; }

        .expand-content {
            padding: 12px 16px 16px;
            font-size: 13px; line-height: 1.85; color: var(--text-mid);
        }

        /* Info rows (no border) */
        /* ใหม่ */
        .info-row-mini { background: transparent !important; border: none !important; box-shadow: none !important; margin-bottom: 0 !important; }
        .info-row-mini .expand-header { padding: 10px 0 !important; cursor: default; border-bottom: 1px solid var(--cream-dark); align-items: flex-start; overflow: hidden; }
        .info-row-mini:last-child .expand-header { border-bottom: none; }
        .info-row-mini .expand-icon { margin-top: 2px; }
        .info-row-mini .info-key { flex-shrink: 0; width: 72px; font-size: 13px; font-weight: 600; color: var(--text-soft); }
        .info-row-mini .info-val { font-size: 13px; color: var(--text-mid); line-height: 1.6; min-width: 0; flex: 1; word-break: break-word; overflow-wrap: break-word; }
        .warning-box {
            background: #fef8ec;
            border: 1.5px solid #f2c97e;
            border-radius: 14px;
            padding: 14px 16px;
            display: flex; gap: 10px; align-items: flex-start;
        }
        .warning-icon  { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
        .warning-text  { font-size: 13px; line-height: 1.7; color: #7a4d10; }
        .warning-title { font-weight: 600; display: block; margin-bottom: 4px; color: #5a3508; }

        /* Gallery */
        .gallery-section { margin-top: 18px; }
        .gallery-viewport {
            position: relative; border-radius: 16px; overflow: hidden;
            border: 1.5px solid var(--teal-pale); background: var(--teal-wash); min-height: 180px;
        }
        .gallery-inner { display: flex; transition: transform 0.6s cubic-bezier(0.4,0,0.2,1); will-change: transform; }
        .gallery-slide { flex: 0 0 100%; display: block; text-decoration: none; position: relative; }
        .gallery-slide img { width: 100%; height: 180px; object-fit: cover; display: block; image-rendering: -webkit-optimize-contrast;}

        .gallery-dots { display: flex; justify-content: center; gap: 6px; margin-top: 10px; }
        .gallery-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal-pale); transition: background 0.3s, transform 0.3s; }
        .gallery-dot.active { background: var(--teal); transform: scale(1.35); }

        @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
        .hero           { animation: fadeUp 0.5s ease both; }
        .content > *    { animation: fadeUp 0.5s ease both; }
        .plant-name     { animation-delay: 0.05s; }
        .section-label  { animation-delay: 0.12s; }
        .expand-list    { animation-delay: 0.16s; }
    </style>
</head>
<body>
<div class="phone-frame">

    <div class="topbar">
        <span class="topbar-title" id="app-title">GreenHub — คู่มือดูแลต้นไม้</span>
    </div>

    <div class="hero">
        <div class="hero-bg-circle"></div>
        <img class="hero-img" id="hero-img" src="" alt="รูปต้นไม้" style="display:none;">
    </div>

    <div class="content">

        <h1 class="plant-name" id="p-name">กำลังโหลด...</h1>

        <p class="section-label">การดูแลเบื้องต้น</p>
        <div class="expand-list">
            <div class="expand-row info-row-mini">
                <div class="expand-header">
                    <span class="expand-icon">☀️</span>
                    <span class="info-key">แสงแดด :</span>
                    <span class="info-val" id="p-sunlight"></span>
                </div>
            </div>
            <div class="expand-row info-row-mini">
                <div class="expand-header">
                    <span class="expand-icon">💧</span>
                    <span class="info-key">รดน้ำ :</span>
                    <span class="info-val" id="p-water"></span>
                </div>
            </div>
            <div class="expand-row info-row-mini">
                <div class="expand-header">
                    <span class="expand-icon">🌡</span>
                    <span class="info-key">อากาศ :</span>
                    <span class="info-val" id="p-temp"></span>
                </div>
            </div>
            <div class="expand-row info-row-mini">
                <div class="expand-header">
                    <span class="expand-icon">🌱</span>
                    <span class="info-key">ปุ๋ย :</span>
                    <span class="info-val" id="p-fertilizer"></span>
                </div>
            </div>
        </div>

        <p class="section-label">รายละเอียด</p>
        <div class="expand-list">
            <div class="expand-row" onclick="toggle(this)">
                <div class="expand-header">
                    <span class="expand-icon">📖</span>
                    <span class="expand-title" id="history-title">ประวัติ</span>
                    <span class="expand-arrow">▼</span>
                </div>
                <div class="expand-body"><div class="expand-body-inner">
                    <div class="expand-content" id="p-history"></div>
                </div></div>
            </div>
            <div class="expand-row" onclick="toggle(this)">
                <div class="expand-header">
                    <span class="expand-icon">🌿</span>
                    <span class="expand-title">วิธีดูแลอย่างละเอียด</span>
                    <span class="expand-arrow">▼</span>
                </div>
                <div class="expand-body"><div class="expand-body-inner">
                    <div class="expand-content" id="p-care_detail"></div>
                </div></div>
            </div>
            <div class="expand-row" onclick="toggle(this)">
                <div class="expand-header">
                    <span class="expand-icon">🌱</span>
                    <span class="expand-title">ปุ๋ยและดิน</span>
                    <span class="expand-arrow">▼</span>
                </div>
                <div class="expand-body"><div class="expand-body-inner">
                    <div class="expand-content" id="p-soil_detail"></div>
                </div></div>
            </div>
        </div>

        <p class="section-label">ข้อควรระวัง</p>
        <div class="warning-box">
            <span class="warning-icon">⚠️</span>
            <div class="warning-text">
                <span class="warning-title">ระวัง — พิษต่อคนและสัตว์เลี้ยง</span>
                <span id="p-cautious"></span>
            </div>
        </div>

        <div class="gallery-section">
            <div class="gallery-viewport">
                <div class="gallery-inner" id="galleryInner">
                    <!-- Slide 1 -->
                    <a class="gallery-slide" id="slide0" href="https://web.facebook.com/genius.tagtree" target="_blank" rel="noopener">
                        <img class="hero-img" src="cover1.png" alt="ภาพที่ 1">
                    </a>
                    <!-- Slide 2 -->
                    <a class="gallery-slide" id="slide1" href="https://web.facebook.com/genius.tagtree" target="_blank" rel="noopener">
                            <img class="hero-img" src="cover2.png" alt="ภาพที่ 2">
                    </a>
                </div>
            </div>
            <div class="gallery-dots" id="galleryDots">
                <div class="gallery-dot active"></div>
                <div class="gallery-dot"></div>
            </div>
        </div>

    </div>
</div>

<script>
    /* ── Expand/collapse ── */
    function toggle(row) {
        const isOpen = row.classList.contains('open');
        document.querySelectorAll('.expand-row').forEach(r => r.classList.remove('open'));
        if (!isOpen) row.classList.add('open');
    }

    /* ── แปลง Google Drive URL → direct image link ── */
    function convertDriveUrl(url) {
        if (!url) return '';
        url = url.trim();

        //let fileId = '';
        const m1 = url.match(/\/file\/d\/([^\/\?&]+)/);
        const m2 = url.match(/[?&]id=([^&]+)/);
        const id = m1 ? m1[1] : m2 ? m2[1] : null;
        if (id) {
            return `https://lh3.googleusercontent.com/d/${id}`;
            }
        }

    function setImgWithFallback(imgEl, id) {
    const formats = [
        `https://drive.google.com/thumbnail?id=${id}&sz=w1600-h1600`,
        `https://lh3.googleusercontent.com/d/${id}`,
        `https://drive.google.com/uc?export=view&id=${id}`,
    ];
    let i = 0;
    function tryNext() {
        if (i >= formats.length) return;
        imgEl.src = formats[i++];
    }
    imgEl.onerror = tryNext;
    tryNext();
}


        //const m1 = url.match(/\/file\/d\/([^\/\?&]+)/);
        //if (m1) {
            //return `https://drive.google.com/thumbnail?id=${m1[1]}&sz=1200`;
        //}
        //const m2 = url.match(/[?&]id=([^&]+)/);
        //if (m2) {
            //return `https://drive.google.com/thumnail?id=${m2[1]}&sz=w1200`;
        //}
        //return url;

    /* ── Gallery ── */
    let galleryTotal = 0, galleryCurrent = 0, galleryTimer = null;

    function buildGallery(urls) {
        const inner  = document.getElementById('galleryInner');
        const dotsEl = document.getElementById('galleryDots');
        inner.innerHTML  = '';
        dotsEl.innerHTML = '';
        galleryTotal   = urls.length;
        galleryCurrent = 0;

        const GALLERY_LINK = 'https://www.facebook.com/genius.tagtree/';

        urls.forEach((rawUrl, i) => {
            const url   = convertDriveUrl(rawUrl); // ← แปลงก่อนใช้
            const slide = document.createElement('a');
            slide.className = 'gallery-slide';

            slide.href = GALLERY_LINK; 
            slide.target = '_blank'; 
            slide.rel = 'noopener';

            const img = document.createElement('img');
            const mm = rawUrl.match(/\/file\/d\/([^\/\?&]+)/) || rawUrl.match(/[?&]id=([^&]+)/);
            const fid = mm ? mm[1] : null;
            if (fid) {
                setImgWithFallback(img, fid);
            } else {
                img.src = rawUrl;
            }
            img.alt = `ภาพที่ ${i + 1}`;
            slide.appendChild(img);
            inner.appendChild(slide);

            const dot = document.createElement('div');
            dot.className = 'gallery-dot' + (i === 0 ? ' active' : '');
            dotsEl.appendChild(dot);
        });

        if (galleryTimer) clearInterval(galleryTimer);
        if (galleryTotal > 1) galleryTimer = setInterval(() => goSlide(galleryCurrent + 1), 3500);
    }

    function goSlide(idx) {
        const inner = document.getElementById('galleryInner');
        const dots  = document.querySelectorAll('.gallery-dot');
        galleryCurrent = (idx + galleryTotal) % galleryTotal;
        inner.style.transform = `translateX(-${galleryCurrent * 100}%)`;
        dots.forEach((d, i) => d.classList.toggle('active', i === galleryCurrent));
    }

    /* ── Fetch from Google Sheet ── */
    const urlParams = new URLSearchParams(window.location.search);
    const SHEET_ID = urlParams.get('sheet') || '1_6TKRWmbpbicVoQJZNI5TPJgwYeW7ZJIlDFfbAo25u4';
    const SHEET_NAME = urlParams.get('tab') || 'Sheet1';
    const API_URL = `https://opensheet.elk.sh/${SHEET_ID}/${SHEET_NAME}`;

    async function fetchPlantData() {
        try {
            const res   = await fetch(API_URL);
            const data  = await res.json();
            //const plant = data[0];

            // 1. ดึงค่า "name" จาก URL (เช่น ?name=Monstera)
            const urlParams = new URLSearchParams(window.location.search);
            const plantNameQuery = urlParams.get('name'); // ดึงค่าจาก ?name=...

            if (!plantNameQuery || plantNameQuery.trim() === '') {
                alert('⚠️ กรุณาระบุชื่อต้นไม้ใน URL');
                document.getElementById('p-name').innerText = '⚠️ กรุณาระบุชื่อต้นไม้ใน URL';
            return;
            }

            const plant = data.find(item =>
                item.name.trim().toLowerCase() === plantNameQuery.trim().toLowerCase()
            );

            if (!plant) {
                alert(`❌ ไม่พบต้นไม้ชื่อ "${plantNameQuery}"\nกรุณาตรวจสอบชื่อให้ถูกต้อง`);
                document.getElementById('p-name').innerText = `❌ ไม่พบต้นไม้ชื่อ "${plantNameQuery}"`;
            return;
            }

            // ① ประกาศตัวแปรทั้งหมดก่อน
            const plantName = plant.name       || '';
            const appName   = plant.name_store || 'GreenHub';

            // ② Topbar
            document.getElementById('app-title').innerText = `${appName} — คู่มือดูแลต้นไม้`;

            // ③ ชื่อต้นไม้
            document.getElementById('p-name').innerText        = plantName;
            document.getElementById('history-title').innerText = `ประวัติ : ${plantName}`;

            // ④ รูป Hero — แปลง Drive URL ก่อนใส่ src
            if (plant.image) {
                const heroImg = document.getElementById('hero-img');
                const m1 = plant.image.match(/\/file\/d\/([^\/\?&]+)/);
                const m2 = plant.image.match(/[?&]id=([^&]+)/);
                const id = m1 ? m1[1] : m2 ? m2[1] : null;
                    if (id) {
                        heroImg.style.display = 'block';
                        setImgWithFallback(heroImg, id);
                    }
                heroImg.style.display = 'block';
            }

            // ⑤ ข้อมูลการดูแล
            document.getElementById('p-sunlight').innerText    = plant.sunlight    || '';
            document.getElementById('p-water').innerText       = plant.water       || '';
            document.getElementById('p-temp').innerText        = plant.temp        || '';
            document.getElementById('p-fertilizer').innerText  = plant.fertilizer  || '';
            document.getElementById('p-history').innerText     = plant.history     || '';
            document.getElementById('p-care_detail').innerText = plant.care_detail || '';
            document.getElementById('p-soil_detail').innerText = plant.soil_detail || '';
            document.getElementById('p-cautious').innerText    = plant.cautious    || '';

            // ⑥ Gallery — แปลง Drive URL ใน buildGallery อัตโนมัติ
            if (plant.gallery) {
                const urls = plant.gallery.split('|').map(u => u.trim()).filter(u => u);
                if (urls.length > 0) buildGallery(urls);
            }

        } catch (err) {
            console.error('Error fetching data:', err);
            document.getElementById('p-name').innerText = 'โหลดข้อมูลไม่สำเร็จ';
        }
    }

    window.onload = () => { fetchPlantData(); };
</script>
</body>
</html>
